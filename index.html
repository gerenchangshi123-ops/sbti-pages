<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SBTI - 离谱人格测试</title>
  <style>
    :root {
      --bg: #f6faf6;
      --panel: #ffffff;
      --text: #1e2a22;
      --muted: #617066;
      --line: #dbe8dd;
      --accent: #4d6a53;
      --soft: #edf6ef;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: linear-gradient(180deg, var(--bg), #ffffff);
      color: var(--text);
      font: 16px/1.75 -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
    }
    main {
      max-width: 860px;
      margin: 0 auto;
      padding: 56px 20px 80px;
      text-align: center;
    }
    .badge {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--soft);
      color: var(--accent);
      font-weight: 700;
      font-size: 14px;
    }
    h1 {
      margin: 18px 0 8px;
      font-size: 48px;
      line-height: 1.15;
    }
    .subtitle {
      font-size: 20px;
      color: var(--muted);
      margin-bottom: 36px;
    }
    section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 32px 24px;
      margin-top: 18px;
      box-shadow: 0 16px 40px rgba(30, 42, 34, 0.04);
      text-align: left;
    }
    h2 {
      margin: 0 0 12px;
      font-size: 22px;
    }
    ul {
      margin: 0;
      padding-left: 20px;
    }
    p, li { margin: 0 0 10px; }
    a { color: var(--accent); }
    .links {
      margin-top: 32px;
      display: flex;
      gap: 16px;
      justify-content: center;
    }
    .links a {
      padding: 10px 20px;
      border-radius: 12px;
      border: 1px solid var(--line);
      text-decoration: none;
      font-weight: 600;
      transition: background 0.2s;
    }
    .links a:hover {
      background: var(--soft);
    }
  </style>
</head>
<body>
  <main>
    <div class="badge">娱乐人格测试</div>
    <h1>SBTI</h1>
    <p class="subtitle">不是诊断，是更适合发出去的人格测试。</p>

    <section>
      <h2>关于 SBTI</h2>
      <p>30 道正式题，25 种正式人格，特定路径还有隐藏结果。</p>
      <p>测完不是只给你一个结果，而是直接给你一张能发出去的人格海报。</p>
      <ul>
        <li>一张原版插画结果海报</li>
        <li>可直接保存、分享、复制的外发内容</li>
        <li>15 个维度的补充解释</li>
        <li>25 种正式人格图鉴</li>
      </ul>
    </section>

    <div class="links">
      <a href="privacy.html">隐私政策</a>
      <a href="support.html">支持与帮助</a>
    </div>
  </main>
</body>
</html>
