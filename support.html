<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SBTI 支持</title>
  <style>
    :root {
      --bg: #f6faf6;
      --panel: #ffffff;
      --text: #1e2a22;
      --muted: #617066;
      --line: #dbe8dd;
      --accent: #4d6a53;
      --soft: #edf6ef;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: linear-gradient(180deg, var(--bg), #ffffff);
      color: var(--text);
      font: 16px/1.75 -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
    }
    main {
      max-width: 860px;
      margin: 0 auto;
      padding: 56px 20px 80px;
    }
    .badge {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--soft);
      color: var(--accent);
      font-weight: 700;
      font-size: 14px;
    }
    h1 {
      margin: 18px 0 8px;
      font-size: 40px;
      line-height: 1.15;
    }
    .meta {
      color: var(--muted);
      margin-bottom: 28px;
    }
    section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 24px;
      margin-top: 18px;
      box-shadow: 0 16px 40px rgba(30, 42, 34, 0.04);
    }
    h2 {
      margin: 0 0 12px;
      font-size: 22px;
    }
    p { margin: 0 0 10px; }
    a { color: var(--accent); }
  </style>
</head>
<body>
  <main>
    <div class="badge">SBTI 人格测试</div>
    <h1>支持与帮助</h1>
    <p class="meta">如果你在使用 SBTI 时遇到问题，可以在这里找到帮助。</p>

    <section>
      <h2>常见问题</h2>
      <p><strong>Q: 测试结果可以保存吗？</strong></p>
      <p>可以。在结果页面点击保存按钮，海报会保存到你的相册。首次保存时需要授权相册写入权限。</p>
      <p><strong>Q: 测试结果准确吗？</strong></p>
      <p>SBTI 是娱乐向人格测试，不是心理诊断工具。结果仅供娱乐参考，请勿作为医学或心理学依据。</p>
      <p><strong>Q: 需要登录或注册吗？</strong></p>
      <p>不需要。当前版本无需任何账号即可使用全部功能。</p>
      <p><strong>Q: App 会收集我的数据吗？</strong></p>
      <p>不会。详情请查看我们的<a href="privacy.html">隐私政策</a>。</p>
    </section>

    <section>
      <h2>联系我们</h2>
      <p>如有其他问题或建议，请发送邮件至：</p>
      <p><a href="mailto:sbti.app.support@gmail.com">sbti.app.support@gmail.com</a></p>
    </section>
  </main>
</body>
</html>
